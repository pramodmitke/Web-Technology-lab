<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${task.id == null ? 'Assign Task' : 'Edit Task'}">Task Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="form-shell">
    <div class="form-card form-card-wide">
        <div class="page-toolbar compact">
            <div>
                <p class="eyebrow">Task Allocation</p>
                <h1 th:text="${task.id == null ? 'Assign Task' : 'Edit Task'}">Task Form</h1>
            </div>
            <a class="btn btn-outline-dark" th:href="@{/tasks}">Back</a>
        </div>

        <form th:action="${task.id == null} ? @{/tasks} : @{/tasks/{id}(id=${task.id})}" th:object="${task}" method="post" class="form-grid two-col">
            <div>
                <label class="form-label" for="title">Title</label>
                <input id="title" class="form-control" th:field="*{title}" placeholder="Exam Duty">
                <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>
            <div>
                <label class="form-label" for="employeeId">Assign To</label>
                <select id="employeeId" name="employeeId" class="form-select" required>
                    <option value="" disabled th:selected="${selectedEmployeeId == null}">Choose employee</option>
                    <option th:each="employee : ${employees}"
                            th:value="${employee.id}"
                            th:text="${employee.name + ' - ' + employee.department}"
                            th:selected="${selectedEmployeeId != null and selectedEmployeeId == employee.id}"></option>
                </select>
            </div>
            <div class="full-width">
                <label class="form-label" for="description">Description</label>
                <textarea id="description" class="form-control" rows="4" th:field="*{description}" placeholder="Describe the responsibility"></textarea>
                <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>
            <div>
                <label class="form-label" for="priority">Priority</label>
                <select id="priority" class="form-select" th:field="*{priority}">
                    <option value="" disabled th:selected="${task.priority == null}">Choose priority</option>
                    <option th:each="priority : ${T(com.assignment10.taskmanager.model.TaskPriority).values()}"
                            th:value="${priority}"
                            th:text="${priority}"></option>
                </select>
                <div class="text-danger small" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></div>
            </div>
            <div>
                <label class="form-label" for="status">Status</label>
                <select id="status" class="form-select" th:field="*{status}">
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status}"></option>
                </select>
                <div class="text-danger small" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
            </div>
            <div>
                <label class="form-label" for="dueDate">Due Date</label>
                <input id="dueDate" type="date" class="form-control" th:field="*{dueDate}">
                <div class="text-danger small" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></div>
            </div>
            <div class="form-actions full-width">
                <button class="btn btn-primary" type="submit">Save Task</button>
                <a class="btn btn-light" th:href="@{/tasks}">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
