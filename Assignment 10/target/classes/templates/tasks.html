<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-frame">
    <div class="page-toolbar">
        <div>
            <p class="eyebrow">Task Register</p>
            <h1>Assigned Tasks</h1>
        </div>
        <div class="toolbar-actions">
            <a class="btn btn-primary" th:href="@{/}">Dashboard</a>
            <a class="btn btn-dark" th:href="@{/tasks/new}">Assign Task</a>
        </div>
    </div>

    <div class="panel-card task-list-card">
        <div class="task-stack">
            <article class="task-item task-row" th:each="task : ${tasks}">
                <div class="task-main">
                    <div class="task-topline">
                        <h3 th:text="${task.title}">Task</h3>
                        <span class="status-pill" th:text="${task.status}">PENDING</span>
                    </div>
                    <p th:text="${task.description}">Description</p>
                    <div class="task-meta">
                        <span><strong>Employee:</strong> <span th:text="${task.employee != null ? task.employee.name : 'Unassigned'}">Employee</span></span>
                        <span><strong>Priority:</strong> <span th:text="${task.priority}">HIGH</span></span>
                        <span><strong>Due:</strong> <span th:text="${task.dueDate}">2026-04-25</span></span>
                    </div>
                </div>
                <div class="task-actions">
                    <form th:action="@{'/tasks/' + ${task.id} + '/status'}" method="post" class="status-form">
                        <select class="form-select form-select-sm" name="status">
                            <option th:each="status : ${T(com.assignment10.taskmanager.model.TaskStatus).values()}"
                                    th:value="${status}"
                                    th:text="${status}"
                                    th:selected="${status == task.status}"></option>
                        </select>
                        <button class="btn btn-sm btn-outline-primary" type="submit">Update</button>
                    </form>
                    <div class="action-cell">
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{'/tasks/' + ${task.id} + '/edit'}">Edit</a>
                        <form th:action="@{'/tasks/' + ${task.id} + '/delete'}" method="post" class="d-inline">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                        </form>
                    </div>
                </div>
            </article>
        </div>
    </div>
</div>
</body>
</html>
