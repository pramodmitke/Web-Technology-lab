<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-frame">
    <div class="page-toolbar">
        <div>
            <p class="eyebrow">Master Data</p>
            <h1>Employees</h1>
        </div>
        <div class="toolbar-actions">
            <a class="btn btn-primary" th:href="@{/}">Dashboard</a>
            <a class="btn btn-dark" th:href="@{/employees/new}">Add Employee</a>
        </div>
    </div>

    <div class="panel-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Email</th>
                    <th>Designation</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="employee : ${employees}">
                    <td th:text="${employee.name}">Name</td>
                    <td th:text="${employee.department}">Department</td>
                    <td th:text="${employee.email}">Email</td>
                    <td th:text="${employee.designation}">Designation</td>
                    <td class="action-cell">
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{'/employees/' + ${employee.id} + '/edit'}">Edit</a>
                        <form th:action="@{'/employees/' + ${employee.id} + '/delete'}" method="post" class="d-inline">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
