<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${employee.id == null ? 'Add Employee' : 'Edit Employee'}">Employee Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="form-shell">
    <div class="form-card">
        <div class="page-toolbar compact">
            <div>
                <p class="eyebrow">Employee Record</p>
                <h1 th:text="${employee.id == null ? 'Add Employee' : 'Edit Employee'}">Employee Form</h1>
            </div>
            <a class="btn btn-outline-dark" th:href="@{/employees}">Back</a>
        </div>

        <form th:action="${employee.id == null} ? @{/employees} : @{/employees/{id}(id=${employee.id})}" th:object="${employee}" method="post" class="form-grid">
            <div>
                <label class="form-label" for="name">Name</label>
                <input id="name" class="form-control" th:field="*{name}" placeholder="Faculty name">
                <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div>
                <label class="form-label" for="department">Department</label>
                <input id="department" class="form-control" th:field="*{department}" placeholder="Department">
                <div class="text-danger small" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></div>
            </div>
            <div>
                <label class="form-label" for="email">Email</label>
                <input id="email" type="email" class="form-control" th:field="*{email}" placeholder="name@college.edu">
                <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div>
                <label class="form-label" for="designation">Designation</label>
                <input id="designation" class="form-control" th:field="*{designation}" placeholder="Associate Professor">
                <div class="text-danger small" th:if="${#fields.hasErrors('designation')}" th:errors="*{designation}"></div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" type="submit">Save Employee</button>
                <a class="btn btn-light" th:href="@{/employees}">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
