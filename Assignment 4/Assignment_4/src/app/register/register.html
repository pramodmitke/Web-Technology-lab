<div class="register-container">
    <h2>Register</h2>

    <form>
        <table>
            <tr>
                <td>First Name</td>
                <td><input type="text" placeholder="Enter first name"></td>
            </tr>
            <tr>
                <td>Last Name</td>
                <td><input type="text" placeholder="Enter last name"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" placeholder="Enter email"></td>
            </tr>
            <tr>
                <td>Phone Number</td>
                <td><input type="tel" placeholder="Enter phone number"></td>
            </tr>
            <tr>
                <td>Date of Birth</td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <select>
                        <option value="" disabled selected>Select gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Address</td>
                <td><input type="text" placeholder="Enter address"></td>
            </tr>
            <tr>
                <td>City</td>
                <td><input type="text" placeholder="Enter city"></td>
            </tr>
            <tr>
                <td>State</td>
                <td><input type="text" placeholder="Enter state"></td>
            </tr>
            <tr>
                <td>Zip Code</td>
                <td><input type="text" placeholder="Enter zip code"></td>
            </tr>
            <tr>
                <td>Country</td>
                <td>
                    <select>
                        <option value="" disabled selected>Select country</option>
                        <option value="india">India</option>
                        <option value="usa">USA</option>
                        <option value="uk">UK</option>
                        <option value="canada">Canada</option>
                        <option value="australia">Australia</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Username</td>
                <td><input type="text" placeholder="Choose a username"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" placeholder="Enter password"></td>
            </tr>
            <tr>
                <td>Confirm Password</td>
                <td><input type="password" placeholder="Confirm password"></td>
            </tr>
            <tr>
                <td>Profile Picture</td>
                <td><input type="file" accept="image/*"></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <button type="submit">Register</button>
                </td>
            </tr>
        </table>
    </form>

    <br>
    <p>Already have an account?</p>
    <div style="text-align:center">
        <button type="button" routerLink="/login">Login</button>
    </div>
</div>
