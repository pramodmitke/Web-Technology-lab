<div class="login-container">
    <h2>Login</h2>

    <form>
        <table>
            <tr>
                <td>Email</td>
                <td><input type="email" placeholder="Enter email"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" placeholder="Enter password"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><button type="submit">Login</button></td>
            </tr>
        </table>
    </form>

    <p>Don't have an account?</p>
    <div style="text-align:center">
        <button type="button" routerLink="/register">Register</button>
    </div>
</div>
